name: Dev Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  TF_ENV: dev
  TF_IN_AUTOMATION: "true"

jobs:
  # ──────────────────────────────────────────────────────#
  # JOB 1: VALIDATE 
  # Runs on BOTH pull_request and push to main.
  # Pure static analysis — no backend, no apply.
  # ──────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment: devacadev

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.11"

      - name: terraform fmt check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: terraform validate
        id: validate
        # -backend=false skips all backend connectivity —
        # validate only needs provider schemas, not real state
        run: |
          terraform init -backend=false
          terraform validate -no-color

      # ── tflint ────────────────────────────────────────
      # Needs real AWS credentials so the aws ruleset plugin
      # can validate instance types, AMIs, etc. against the
      # actual AWS API
      - name: Configure AWS credentials for tflint
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest
          cache: true

      - name: tflint init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run tflint
        id: tflint
        run: tflint -f compact --recursive 2>&1 | tee tflint-report.txt
        continue-on-error: true

      - name: Upload tflint report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: tflint-report-${{ github.run_number }}
          path: infra/tflint-report.txt
          retention-days: 14

      # ── Trivy (replaces tfsec) ────────────────────────
      # tfsec is now deprecated upstream — Trivy is the
      # official successor with the same IaC scanning engine
      - name: Run Trivy IaC scan
        id: trivy
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: config
          scan-ref: infra/
          format: sarif
          output: trivy-report.sarif
          exit-code: "1"         # fail the step on findings
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Upload Trivy SARIF report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: trivy-sarif-${{ github.run_number }}
          path: trivy-report.sarif
          retention-days: 14

      # ── Checkov ───────────────────────────────────────
      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          output_format: cli,junitxml
          output_file_path: console,infra/checkov-report.xml
          soft_fail: true        # let the step pass so the artifact uploads;
                                 # we gate the job manually below
        continue-on-error: true

      - name: Upload Checkov JUnit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: checkov-report-${{ github.run_number }}
          path: infra/checkov-report.xml
          retention-days: 14

    #   # ── Gate: fail the job if anything found issues ───
    #   # All tools ran and all reports uploaded above.
    #   # Now we fail deliberately if any step was unhappy.
    #   - name: Evaluate tool outcomes
    #     if: always()
    #     run: |
    #       FAILED=0
    #       [ "${{ steps.fmt.outcome }}"     == "failure" ] && echo "::error::terraform fmt check failed — run 'terraform fmt -recursive' locally" && FAILED=1
    #       [ "${{ steps.tflint.outcome }}"  == "failure" ] && echo "::error::tflint found issues — see tflint-report artifact" && FAILED=1
    #       [ "${{ steps.trivy.outcome }}"   == "failure" ] && echo "::error::Trivy found HIGH/CRITICAL issues — see trivy-sarif artifact" && FAILED=1
    #       [ "${{ steps.checkov.outcome }}" == "failure" ] && echo "::error::Checkov found violations — see checkov-report artifact" && FAILED=1
    #       exit $FAILED


  # ──────────────────────────────────────────────────────
  # JOB 2: PLAN-DEV (PR only)
  # Posts plan output as a PR comment so reviewers can
  # see exactly what will change before approving.
  # Does NOT save a plan file — this is for human review.
  # ──────────────────────────────────────────────────────
  plan-dev-pr:
    name: Plan (Dev) — PR preview
    needs: validate
    runs-on: ubuntu-latest
    environment: devacadev
    if: github.event_name == 'pull_request'

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.11"
          terraform_wrapper: true   # required to capture stdout for the PR comment

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=iff/${{ env.TF_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true" \
            -input=false

      - name: terraform plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/${{ env.TF_ENV }}.tfvars" \
            -no-color \
            -input=false
        continue-on-error: true   # allow comment to post even if plan errors

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const planOut    = `${{ steps.plan.outputs.stdout }}`;
            const planErr    = `${{ steps.plan.outputs.stderr }}`;
            const planStatus = '${{ steps.plan.outcome }}';
            const statusIcon = planStatus === 'success' ? '✅' : '❌';

            const body = [
              `### Terraform Plan — \`dev\` environment ${statusIcon}`,
              `<details><summary>Show Plan Output</summary>`,
              ``,
              `\`\`\`hcl`,
              planOut || planErr,
              `\`\`\``,
              `</details>`,
              ``,
              `*@${{ github.actor }} · Run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`
            ].join('\n');

            // Replace previous plan comment on this PR to keep things clean
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.body.includes('### Terraform Plan — `dev` environment')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1


  # ──────────────────────────────────────────────────────
  # JOB 3: PLAN-DEV (main merge)
  # Generates and saves a concrete plan file as an artifact.
  # The apply job below downloads and applies exactly this
  # file — no re-planning, no drift between plan and apply.
  # ──────────────────────────────────────────────────────
  plan-dev-main:
    name: Plan (Dev) — pre-apply
    needs: validate
    runs-on: ubuntu-latest
    environment: devacadev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.11"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=iff/${{ env.TF_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true" \
            -input=false

      - name: terraform plan
        run: |
          terraform plan \
            -var-file="environments/${{ env.TF_ENV }}.tfvars" \
            -no-color \
            -input=false \
            -out=tfplan   # saved to infra/tfplan

      # Upload the binary plan file so apply-dev can consume it.
      # The .terraform directory is NOT included — apply will re-init
      # using the same backend config and provider lock file.
      - name: Upload plan artifact
        uses: actions/upload-artifact@v6
        with:
          name: tfplan-dev-${{ github.run_number }}
          path: infra/tfplan
          retention-days: 1   # short TTL — only needed until apply completes


  # ──────────────────────────────────────────────────────
  # JOB 4: APPLY-DEV (main merge only)
  # Downloads the plan file from plan-dev-main and applies
  # it. Because we apply a saved plan, what gets deployed
  # is exactly what was shown in the plan step — no surprises.
  # ──────────────────────────────────────────────────────
  apply-dev:
    name: Apply (Dev)
    needs: plan-dev-main
    runs-on: ubuntu-latest
    environment: devacadev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.11"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=iff/${{ env.TF_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true" \
            -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev-${{ github.run_number }}
          path: infra/   # downloads tfplan into the infra directory

      - name: terraform apply
        run: |
          terraform apply \
            -input=false \
            -no-color \
            tfplan