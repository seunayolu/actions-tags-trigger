name: Promote Pipeline

on:
  push:
    tags:
      - 'testing-*'   # e.g. testing-1.2.0
      - 'release-*'   # e.g. release-2.0.0

permissions:
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: "true"

jobs:
  # ──────────────────────────────────────────────────────
  # JOB 1: VALIDATE
  # Runs on both testing-* and release-* tag pushes.
  # Determines TF_ENV dynamically from the tag name so
  # tflint uses the correct environment's AWS credentials.
  # ──────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest

    # Resolve which environment to use based on the tag prefix.
    # This controls which environment's secrets and vars are available.
    environment: ${{ startsWith(github.ref_name, 'testing-') && 'testdevopsacad' || 'proddevopsprep' }}

    defaults:
      run:
        working-directory: Infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Derive TF_ENV from the tag name at runtime.
      # testing-1.2.0  → TF_ENV=testing
      # release-2.0.0  → TF_ENV=prod
      - name: Set TF_ENV from tag
        run: |
          if [[ "${{ github.ref_name }}" == testing-* ]]; then
            echo "TF_ENV=testing" >> $GITHUB_ENV
          else
            echo "TF_ENV=prod" >> $GITHUB_ENV
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.11"

      - name: terraform fmt check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: terraform validate
        id: validate
        run: |
          terraform init -backend=false
          terraform validate -no-color

      # ── tflint ────────────────────────────────────────
      - name: Configure AWS credentials for tflint
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.52.0
          cache: true

      - name: tflint init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run tflint
        id: tflint
        run: tflint -f compact
        continue-on-error: true

      # ── Checkov ───────────────────────────────────────
      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: Infra/
          framework: terraform
          output_format: cli,junitxml
          output_file_path: console,Infra/checkov-report.xml
          soft_fail: true
        continue-on-error: true

      - name: Upload Checkov JUnit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: checkov-report-${{ github.ref_name }}-${{ github.run_number }}
          path: Infra/checkov-report.xml
          retention-days: 14

    #   # ── Gate: fail if any tool found issues ───────────
    #   - name: Evaluate tool outcomes
    #     if: always()
    #     run: |
    #       FAILED=0
    #       [ "${{ steps.fmt.outcome }}"     == "failure" ] && echo "::error::terraform fmt check failed" && FAILED=1
    #       [ "${{ steps.tflint.outcome }}"  == "failure" ] && echo "::error::tflint found issues — see artifact" && FAILED=1
    #       [ "${{ steps.checkov.outcome }}" == "failure" ] && echo "::error::Checkov found violations — see artifact" && FAILED=1
    #       exit $FAILED


  # ──────────────────────────────────────────────────────
  # JOB 2: PLAN (Testing)
  # Runs only on testing-* tags after validate passes.
  # Saves tfplan as artifact for apply-testing to consume.
  # ──────────────────────────────────────────────────────
  plan-testing:
    name: Plan (Testing)
    needs: validate
    runs-on: ubuntu-latest
    environment: testdevopsacad
    if: startsWith(github.ref_name, 'testing-')

    env:
      TF_ENV: testing

    defaults:
      run:
        working-directory: Infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.11"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=iff/${{ env.TF_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true" \
            -input=false

      - name: terraform plan
        run: |
          terraform plan \
            -var-file="environments/${{ env.TF_ENV }}.tfvars" \
            -no-color \
            -input=false \
            -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v6
        with:
          name: tfplan-testing-${{ github.run_number }}
          path: Infra/tfplan
          retention-days: 1


  # ──────────────────────────────────────────────────────
  # JOB 3: APPLY (Testing)
  # Downloads the plan artifact from plan-testing and
  # applies it. GitHub pauses this job here and waits
  # for the required reviewer (devopsacad team) to approve
  # in the GitHub Actions UI before proceeding.
  # ──────────────────────────────────────────────────────
  apply-testing:
    name: Apply (Testing)
    needs: plan-testing
    runs-on: ubuntu-latest
    environment: testdevopsacad
    if: startsWith(github.ref_name, 'testing-')

    env:
      TF_ENV: testing

    defaults:
      run:
        working-directory: Infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.11"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=iff/${{ env.TF_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true" \
            -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan-testing-${{ github.run_number }}
          path: Infra/

      - name: terraform apply
        run: |
          terraform apply \
            -input=false \
            -no-color \
            tfplan


  # ──────────────────────────────────────────────────────
  # JOB 4: PLAN (Prod)
  # Runs only on release-* tags after validate passes.
  # Saves tfplan as artifact for apply-prod to consume.
  # ──────────────────────────────────────────────────────
  plan-prod:
    name: Plan (Prod)
    needs: validate
    runs-on: ubuntu-latest
    environment: proddevopsprep
    if: startsWith(github.ref_name, 'release-')

    env:
      TF_ENV: prod

    defaults:
      run:
        working-directory: Infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.11"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=iff/${{ env.TF_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true" \
            -input=false

      - name: terraform plan
        run: |
          terraform plan \
            -var-file="environments/${{ env.TF_ENV }}.tfvars" \
            -no-color \
            -input=false \
            -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v6
        with:
          name: tfplan-prod-${{ github.run_number }}
          path: Infra/tfplan
          retention-days: 1


  # ──────────────────────────────────────────────────────
  # JOB 5: APPLY (Prod)
  # Downloads the plan artifact from plan-prod and applies
  # it. GitHub pauses here and waits for the required
  # reviewer to approve before any prod changes land.
  # ──────────────────────────────────────────────────────
  apply-prod:
    name: Apply (Prod)
    needs: plan-prod
    runs-on: ubuntu-latest
    environment: proddevopsprep
    if: startsWith(github.ref_name, 'release-')

    env:
      TF_ENV: prod

    defaults:
      run:
        working-directory: Infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.11"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="key=iff/${{ env.TF_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true" \
            -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan-prod-${{ github.run_number }}
          path: Infra/

      - name: terraform apply
        run: |
          terraform apply \
            -input=false \
            -no-color \
            tfplan